name: Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

env:
  WAILS_VERSION: v3.0.0-alpha2.103
  REPO_SLUG: onuragtas/reqost

jobs:
  build:
    name: Build (${{ matrix.platform }}/${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin
            arch: arm64
            runner: macos-14
            ext: tar.gz
          - platform: darwin
            arch: amd64
            runner: macos-14
            ext: tar.gz
          - platform: linux
            arch: amd64
            runner: ubuntu-24.04
            ext: tar.gz
          - platform: windows
            arch: amd64
            runner: windows-latest
            ext: zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev libwebkitgtk-6.0-dev pkg-config

      - name: Install wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Install frontend deps
        working-directory: frontend
        shell: bash
        # `npm ci` is strict about lockfile sync. If a lockfile/package.json
        # drift slips through (e.g. an optional native dep regenerated under a
        # different Node version), fall back to `npm install` so the CI run
        # still produces a binary instead of failing on lockfile bookkeeping.
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Generate Wails bindings
        run: wails3 generate bindings -clean=true

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binary
        shell: bash
        # Mirrors the prod profile of build/{os}/Taskfile.yml:
        #   - `production` build tag is REQUIRED — Wails v3 hides cross-platform
        #     shims behind it; without it pkg/application drags in pkg/mac on
        #     Linux/Windows and the build fails.
        #   - CGO=1 on macOS+Linux (webkit linkage), CGO=0 on Windows.
        #   - macOS deployment target 12.0 (matches the upstream Taskfile).
        #   - Windows: `-H windowsgui` keeps a console window from spawning.
        env:
          GOOS: ${{ matrix.platform }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: ${{ matrix.platform == 'windows' && '0' || '1' }}
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.platform == 'darwin' && '12.0' || '' }}
          CGO_CFLAGS:  ${{ matrix.platform == 'darwin' && '-mmacosx-version-min=12.0' || '' }}
          CGO_LDFLAGS: ${{ matrix.platform == 'darwin' && '-mmacosx-version-min=12.0' || '' }}
        run: |
          # Cross-compile darwin/amd64 on the arm64 runner using the macOS SDK
          if [[ "${{ matrix.platform }}" == "darwin" && "${{ matrix.arch }}" == "amd64" ]]; then
            SDK="$(xcrun --sdk macosx --show-sdk-path)"
            export CC="clang -arch x86_64 -isysroot $SDK"
            export CXX="clang++ -arch x86_64 -isysroot $SDK"
            export CGO_CFLAGS="-arch x86_64 -mmacosx-version-min=12.0"
            export CGO_LDFLAGS="-arch x86_64 -mmacosx-version-min=12.0"
          fi
          mkdir -p dist
          out="dist/reqost"
          extra_ldflags=""
          if [[ "${{ matrix.platform }}" == "windows" ]]; then
            out="dist/reqost.exe"
            extra_ldflags="-H windowsgui"
          fi
          go build -tags production -trimpath -buildvcs=false \
            -ldflags "-s -w $extra_ldflags -X reqost/internal/update.Version=${{ steps.ver.outputs.version }} -X reqost/internal/update.RepoSlug=${{ env.REPO_SLUG }}" \
            -o "$out" .

      - name: Package (unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          cd dist
          name="reqost-${{ matrix.platform }}-${{ matrix.arch }}"
          tar czf "${name}.tar.gz" reqost
          if [[ "${{ matrix.platform }}" == "darwin" ]]; then
            shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256"
          else
            sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256"
          fi
          rm reqost

      - name: Package (windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          cd dist
          $name = "reqost-${{ matrix.platform }}-${{ matrix.arch }}"
          Compress-Archive -Path reqost.exe -DestinationPath "$name.zip"
          (Get-FileHash "$name.zip" -Algorithm SHA256).Hash.ToLower() + "  $name.zip" | Out-File -Encoding ASCII "$name.zip.sha256"
          Remove-Item reqost.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reqost-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error
          retention-days: 30

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
