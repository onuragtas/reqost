name: Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

env:
  WAILS_VERSION: v3.0.0-alpha2.103
  REPO_SLUG: onuragtas/reqost

jobs:
  build:
    name: Build (${{ matrix.platform }}/${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin
            arch: arm64
            runner: macos-14
            ext: tar.gz
          - platform: darwin
            arch: amd64
            runner: macos-13
            ext: tar.gz
          - platform: linux
            arch: amd64
            runner: ubuntu-latest
            ext: tar.gz
          - platform: windows
            arch: amd64
            runner: windows-latest
            ext: zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Install wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Generate Wails bindings
        run: wails3 generate bindings -clean=true

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binary
        shell: bash
        env:
          CGO_ENABLED: ${{ matrix.platform == 'linux' && '1' || '0' }}
          GOOS: ${{ matrix.platform }}
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p dist
          out="dist/reqost"
          [[ "${{ matrix.platform }}" == "windows" ]] && out="dist/reqost.exe"
          go build -trimpath \
            -ldflags "-s -w -X reqost/internal/update.Version=${{ steps.ver.outputs.version }} -X reqost/internal/update.RepoSlug=${{ env.REPO_SLUG }}" \
            -o "$out" .

      - name: Package (unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          cd dist
          name="reqost-${{ matrix.platform }}-${{ matrix.arch }}"
          tar czf "${name}.tar.gz" reqost
          if [[ "${{ matrix.platform }}" == "darwin" ]]; then
            shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256"
          else
            sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256"
          fi
          rm reqost

      - name: Package (windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          cd dist
          $name = "reqost-${{ matrix.platform }}-${{ matrix.arch }}"
          Compress-Archive -Path reqost.exe -DestinationPath "$name.zip"
          (Get-FileHash "$name.zip" -Algorithm SHA256).Hash.ToLower() + "  $name.zip" | Out-File -Encoding ASCII "$name.zip.sha256"
          Remove-Item reqost.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reqost-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error
          retention-days: 30

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
