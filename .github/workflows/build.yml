name: Build & Release

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

env:
  WAILS_VERSION: v3.0.0-alpha2.103
  REPO_SLUG: onuragtas/reqost

jobs:
  # ── 1. Auto-tag ───────────────────────────────────────────────────────────
  # Runs only on master push / manual dispatch (not PRs).
  # Increments the patch version, creates + pushes the tag, and exposes it
  # to downstream jobs via outputs.version.
  tag:
    name: Bump version
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.next.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: next
        run: |
          latest=$(git tag --list 'v[0-9]*' --sort=-version:refname | head -1)
          if [ -z "$latest" ]; then
            next="v1.0.0"
          else
            ver="${latest#v}"
            major="${ver%%.*}"
            rest="${ver#*.}"
            minor="${rest%%.*}"
            patch="${rest#*.}"
            next="v${major}.${minor}.$((patch + 1))"
          fi
          echo "tag=$next" >> "$GITHUB_OUTPUT"
          echo "Tagging as $next (previous: ${latest:-none})"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.next.outputs.tag }}"
          git push origin "${{ steps.next.outputs.tag }}"

  # ── 2. Build ─────────────────────────────────────────────────────────────
  # Runs on every trigger (master, PR, dispatch).
  # On master/dispatch: uses the tag from the tag job as the version.
  # On PRs: tag job is skipped, falls back to dev-<sha>.
  build:
    name: Build (${{ matrix.platform }}/${{ matrix.arch }})
    needs: [tag]
    if: ${{ always() && !cancelled() }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin
            arch: arm64
            runner: macos-14
            ext: tar.gz
          - platform: darwin
            arch: amd64
            runner: macos-14
            ext: tar.gz
          - platform: linux
            arch: amd64
            runner: ubuntu-24.04
            ext: tar.gz
          - platform: windows
            arch: amd64
            runner: windows-latest
            ext: zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev libwebkitgtk-6.0-dev pkg-config

      - name: Install wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Install frontend deps
        working-directory: frontend
        shell: bash
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Generate Wails bindings
        run: wails3 generate bindings -clean=true

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          ver="${{ needs.tag.outputs.version }}"
          if [ -z "$ver" ]; then
            ver="dev-${GITHUB_SHA::7}"
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.platform }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: ${{ matrix.platform == 'windows' && '0' || '1' }}
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.platform == 'darwin' && '12.0' || '' }}
          CGO_CFLAGS:  ${{ matrix.platform == 'darwin' && '-mmacosx-version-min=12.0' || '' }}
          CGO_LDFLAGS: ${{ matrix.platform == 'darwin' && '-mmacosx-version-min=12.0' || '' }}
        run: |
          if [[ "${{ matrix.platform }}" == "darwin" && "${{ matrix.arch }}" == "amd64" ]]; then
            SDK="$(xcrun --sdk macosx --show-sdk-path)"
            export CC="clang -arch x86_64 -isysroot $SDK"
            export CXX="clang++ -arch x86_64 -isysroot $SDK"
            export CGO_CFLAGS="-arch x86_64 -mmacosx-version-min=12.0"
            export CGO_LDFLAGS="-arch x86_64 -mmacosx-version-min=12.0"
          fi
          mkdir -p dist
          out="dist/reqost"
          extra_ldflags=""
          if [[ "${{ matrix.platform }}" == "windows" ]]; then
            out="dist/reqost.exe"
            extra_ldflags="-H windowsgui"
          fi
          go build -tags production -trimpath -buildvcs=false \
            -ldflags "-s -w $extra_ldflags -X reqost/internal/update.Version=${{ steps.ver.outputs.version }} -X reqost/internal/update.RepoSlug=${{ env.REPO_SLUG }}" \
            -o "$out" .

      - name: Package (unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          cd dist
          name="reqost-${{ matrix.platform }}-${{ matrix.arch }}"
          tar czf "${name}.tar.gz" reqost
          if [[ "${{ matrix.platform }}" == "darwin" ]]; then
            shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256"
          else
            sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256"
          fi
          rm reqost

      - name: Package (windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          cd dist
          $name = "reqost-${{ matrix.platform }}-${{ matrix.arch }}"
          Compress-Archive -Path reqost.exe -DestinationPath "$name.zip"
          (Get-FileHash "$name.zip" -Algorithm SHA256).Hash.ToLower() + "  $name.zip" | Out-File -Encoding ASCII "$name.zip.sha256"
          Remove-Item reqost.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reqost-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error
          retention-days: 30

  # ── 3. Release ────────────────────────────────────────────────────────────
  # Only runs when the tag job succeeded (master push / dispatch).
  release:
    name: Release
    needs: [tag, build]
    if: needs.tag.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.version }}
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.tag.outputs.version, '-') }}
