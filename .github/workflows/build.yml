name: Build & Release

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump (auto = parse commits, none = skip tagging)'
        required: false
        default: 'auto'
        type: choice
        options: [auto, patch, minor, major, none]

permissions:
  contents: read

env:
  WAILS_VERSION: v3.0.0-alpha2.103
  REPO_SLUG: onuragtas/reqost

jobs:
  # ── 1. Auto-tag ───────────────────────────────────────────────────────────
  # Runs on master push / manual dispatch (not PRs).
  #
  # Bump level resolution (highest precedence first):
  #   1. workflow_dispatch input `bump`:
  #        - patch | minor | major  → forced bump
  #        - none                   → skip tagging entirely (outputs.version empty)
  #        - auto                   → fall through to commit parsing (default)
  #   2. Conventional Commits in the range last_tag..HEAD:
  #        - any `BREAKING CHANGE` footer or `<type>!:` subject  → major
  #        - any `feat:` subject                                 → minor
  #        - else                                                → patch
  tag:
    name: Bump version
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.next.outputs.tag }}
      level:   ${{ steps.next.outputs.level }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: next
        env:
          BUMP_INPUT: ${{ inputs.bump }}
        run: |
          set -euo pipefail

          if [[ "${BUMP_INPUT:-}" == "none" ]]; then
            echo "Bump skipped (workflow_dispatch input = none)"
            echo "tag="    >> "$GITHUB_OUTPUT"
            echo "level=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest=$(git tag --list 'v[0-9]*' --sort=-version:refname | head -1 || true)

          # Decide bump level.
          if [[ -n "${BUMP_INPUT:-}" && "$BUMP_INPUT" != "auto" ]]; then
            level="$BUMP_INPUT"
            reason="manual dispatch"
          else
            if [ -z "$latest" ]; then
              range="HEAD"
            else
              range="${latest}..HEAD"
            fi
            commits=$(git log --format='%B%n----' "$range" || true)
            level="patch"
            reason="default patch"
            if echo "$commits" | grep -qE '(^|[[:space:]])BREAKING CHANGE'; then
              level="major"; reason="BREAKING CHANGE footer"
            elif echo "$commits" | grep -qE '^[a-zA-Z]+(\([^)]+\))?!:'; then
              level="major"; reason="<type>!: subject"
            elif echo "$commits" | grep -qE '^feat(\([^)]+\))?:'; then
              level="minor"; reason="feat: subject"
            fi
          fi

          # Compute next version.
          if [ -z "$latest" ]; then
            case "$level" in
              major) next="v1.0.0" ;;
              minor) next="v0.1.0" ;;
              *)     next="v0.0.1" ;;
            esac
          else
            ver="${latest#v}"
            major="${ver%%.*}"
            rest="${ver#*.}"
            minor="${rest%%.*}"
            patch="${rest#*.}"
            case "$level" in
              major) next="v$((major+1)).0.0" ;;
              minor) next="v${major}.$((minor+1)).0" ;;
              patch) next="v${major}.${minor}.$((patch+1))" ;;
            esac
          fi

          echo "tag=$next"     >> "$GITHUB_OUTPUT"
          echo "level=$level"  >> "$GITHUB_OUTPUT"
          echo "Tagging as $next (previous: ${latest:-none}, level: $level, reason: $reason)"

      - name: Create and push tag
        if: steps.next.outputs.level != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.next.outputs.tag }}"
          git push origin "${{ steps.next.outputs.tag }}"

  # ── 2. Build ─────────────────────────────────────────────────────────────
  # Runs on every trigger (master, PR, dispatch).
  # On master/dispatch: uses the tag from the tag job as the version.
  # On PRs: tag job is skipped, falls back to dev-<sha>.
  build:
    name: Build (${{ matrix.platform }}/${{ matrix.arch }})
    needs: [tag]
    if: ${{ always() && !cancelled() }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin
            arch: arm64
            runner: macos-14
            ext: tar.gz
          - platform: darwin
            arch: amd64
            runner: macos-14
            ext: tar.gz
          - platform: linux
            arch: amd64
            runner: ubuntu-24.04
            ext: tar.gz
          - platform: windows
            arch: amd64
            runner: windows-latest
            ext: zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # GTK/WebKit dev packages are >150MB and dominate Linux build time.
      # awalsh128/cache-apt-pkgs-action caches the resolved .deb archives in
      # GitHub's actions cache keyed by the package list — on cache hit the
      # apt-get update + download phase is skipped (only the local install
      # remains, which is fast).
      - name: Install Linux build deps (cached)
        if: matrix.platform == 'linux'
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libgtk-4-dev libwebkitgtk-6.0-dev pkg-config
          version: 1.0  # bump if the package list changes meaningfully

      - name: Install wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Install frontend deps
        working-directory: frontend
        shell: bash
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Generate Wails bindings
        run: wails3 generate bindings -clean=true

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          ver="${{ needs.tag.outputs.version }}"
          if [ -z "$ver" ]; then
            ver="dev-${GITHUB_SHA::7}"
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.platform }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: ${{ matrix.platform == 'windows' && '0' || '1' }}
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.platform == 'darwin' && '12.0' || '' }}
          CGO_CFLAGS:  ${{ matrix.platform == 'darwin' && '-mmacosx-version-min=12.0' || '' }}
          CGO_LDFLAGS: ${{ matrix.platform == 'darwin' && '-mmacosx-version-min=12.0' || '' }}
        run: |
          if [[ "${{ matrix.platform }}" == "darwin" && "${{ matrix.arch }}" == "amd64" ]]; then
            SDK="$(xcrun --sdk macosx --show-sdk-path)"
            export CC="clang -arch x86_64 -isysroot $SDK"
            export CXX="clang++ -arch x86_64 -isysroot $SDK"
            export CGO_CFLAGS="-arch x86_64 -mmacosx-version-min=12.0"
            export CGO_LDFLAGS="-arch x86_64 -mmacosx-version-min=12.0"
          fi
          mkdir -p dist
          out="dist/reqost"
          extra_ldflags=""
          if [[ "${{ matrix.platform }}" == "windows" ]]; then
            out="dist/reqost.exe"
            extra_ldflags="-H windowsgui"
          fi
          go build -tags production -trimpath -buildvcs=false \
            -ldflags "-s -w $extra_ldflags -X reqost/internal/update.Version=${{ steps.ver.outputs.version }} -X reqost/internal/update.RepoSlug=${{ env.REPO_SLUG }}" \
            -o "$out" .

      - name: Package (unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          cd dist
          name="reqost-${{ matrix.platform }}-${{ matrix.arch }}"
          tar czf "${name}.tar.gz" reqost
          if [[ "${{ matrix.platform }}" == "darwin" ]]; then
            shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256"
          else
            sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256"
          fi
          rm reqost

      - name: Package (windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          cd dist
          $name = "reqost-${{ matrix.platform }}-${{ matrix.arch }}"
          Compress-Archive -Path reqost.exe -DestinationPath "$name.zip"
          (Get-FileHash "$name.zip" -Algorithm SHA256).Hash.ToLower() + "  $name.zip" | Out-File -Encoding ASCII "$name.zip.sha256"
          Remove-Item reqost.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reqost-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error
          retention-days: 30

  # ── 3. Release ────────────────────────────────────────────────────────────
  # Only runs when the tag job succeeded (master push / dispatch).
  release:
    name: Release
    needs: [tag, build]
    # Skip when the tag job was skipped (PRs) OR when the user picked
    # bump=none on a manual dispatch (level=none, no tag pushed).
    if: needs.tag.result == 'success' && needs.tag.outputs.version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.version }}
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.tag.outputs.version, '-') }}
